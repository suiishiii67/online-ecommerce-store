<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Sign In - Aura</title>
</head>
<body>
    <div class="form-card card text-center">
        <h2>Sign in.</h2>
        <p class="text-grey">Use your Aura ID.</p>
        <form>
            <select><option>Customer</option><option>Administrator</option></select>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button class="btn" style="width: 100%; margin-top: 20px;">Continue</button>
        </form>
    </div>
</body>
</html>
