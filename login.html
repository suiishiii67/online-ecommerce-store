<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — NexGear</title>
  <meta name="description" content="Sign in to your NexGear account."/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ─── Premium Light Login ─── */
    .login-page-bg {
      min-height: 100vh;
      background: var(--off-white);
      position: relative;
      overflow: hidden;
    }

    /* Soft radial glow decorations */
    .login-page-bg::before {
      content: '';
      position: fixed;
      top: -180px;
      right: -120px;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(0,113,227,0.09) 0%, transparent 68%);
      pointer-events: none;
      z-index: 0;
      animation: glow-drift-a 9s ease-in-out infinite alternate;
    }

    .login-page-bg::after {
      content: '';
      position: fixed;
      bottom: -140px;
      left: -80px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(120,60,220,0.07) 0%, transparent 68%);
      pointer-events: none;
      z-index: 0;
      animation: glow-drift-b 11s ease-in-out infinite alternate;
    }

    @keyframes glow-drift-a {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-30px, 40px) scale(1.12); }
    }
    @keyframes glow-drift-b {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, -30px) scale(1.1); }
    }

    /* ── Page layout ── */
    .login-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(var(--nav-height) + 32px) 20px 56px;
    }

    /* ── Card ── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border: 1px solid var(--light-gray);
      border-radius: 28px;
      padding: 48px 44px;
      box-shadow:
        0 4px 24px rgba(0,0,0,0.06),
        0 24px 64px rgba(0,0,0,0.05),
        0 0 0 1px rgba(255,255,255,0.9) inset;
      animation: card-enter 0.55s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 26px;
    }

    .login-logo-badge {
      width: 52px;
      height: 52px;
      background: var(--text-primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.35s ease;
    }

    .login-logo:hover .login-logo-badge {
      transform: scale(1.1) rotate(-6deg);
      box-shadow: 0 10px 28px rgba(0,0,0,0.24);
    }

    /* ── Header ── */
    .login-title {
      font-size: 27px;
      font-weight: 700;
      letter-spacing: -0.8px;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* ── Fields ── */
    .login-field {
      margin-bottom: 18px;
    }

    .login-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .login-label a {
      color: var(--accent-blue);
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      font-size: 12px;
      text-decoration: none;
      transition: opacity 0.18s;
    }
    .login-label a:hover { opacity: 0.7; text-decoration: underline; }

    .login-input {
      width: 100%;
      background: var(--off-white);
      border: 1.5px solid var(--light-gray);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 14px;
      color: var(--text-primary);
      font-family: var(--font);
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .login-input::placeholder { color: var(--mid-gray); }

    .login-input:focus {
      border-color: var(--accent-blue);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
    }

    /* password wrapper */
    .login-input-wrap { position: relative; }
    .login-input-wrap .login-input { padding-right: 44px; }

    .login-eye {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mid-gray);
      display: flex;
      align-items: center;
      padding: 0;
      transition: color 0.2s;
    }
    .login-eye:hover { color: var(--text-primary); }

    /* ── Remember ── */
    .login-remember {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    .login-remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent-blue);
      cursor: pointer;
    }
    .login-remember span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ── Submit button ── */
    .login-btn {
      width: 100%;
      padding: 15px;
      background: var(--text-primary);
      color: var(--white);
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition:
        transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.3s ease,
        background 0.22s ease;
      font-family: var(--font);
    }

    /* Shimmer sweep */
    .login-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .login-btn:hover {
      background: #222;
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 12px 36px rgba(0,0,0,0.22);
    }

    .login-btn:hover::after { left: 140%; }

    .login-btn:active {
      transform: scale(0.97);
      transition-duration: 0.1s;
    }

    /* ── Divider & footer ── */
    .login-footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .login-footer-link a {
      color: var(--accent-blue);
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.18s;
    }
    .login-footer-link a:hover { opacity: 0.75; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 22px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo">
        <div class="logo-icon">N</div>
        NexGear
      </a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
      <div class="nav-actions">
        <a href="register.html" class="btn-primary">Create Account</a>
      </div>
    </div>
  </nav>

  <div class="login-page-bg">
    <div class="login-page">
      <div class="login-card">

        <div class="login-logo">
          <div class="login-logo-badge">N</div>
        </div>

        <h1 class="login-title">Welcome back</h1>
        <p class="login-sub">Sign in to your NexGear account</p>

        <form id="loginForm" onsubmit="handleLogin(event)">

          <div class="login-field">
            <label class="login-label">Email Address</label>
            <input type="email" class="login-input" placeholder="you@example.com" required autocomplete="email"/>
          </div>

          <div class="login-field">
            <label class="login-label">
              Password
              <a href="#">Forgot password?</a>
            </label>
            <div class="login-input-wrap">
              <input type="password" class="login-input" id="pwdInput" placeholder="••••••••" required autocomplete="current-password"/>
              <button type="button" class="login-eye" id="togglePwd" aria-label="Toggle password">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17" height="17">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <label class="login-remember">
            <input type="checkbox"/>
            <span>Remember me for 30 days</span>
          </label>

          <button type="submit" class="login-btn" id="signInBtn">Sign In →</button>

        </form>

        <div class="login-footer-link">
          Don't have an account? <a href="register.html">Create one →</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('togglePwd').addEventListener('click', function () {
      const p = document.getElementById('pwdInput');
      const show = p.type === 'password';
      p.type = show ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = show
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    });

    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('signInBtn');
      btn.textContent = 'Signing in…';
      btn.style.opacity = '0.75';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'home.html'; }, 900);
    }
  </script>
  <script src="animations.js"></script>
</body>
</html>
