<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — NexGear</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo">
        <div class="logo-icon">N</div>
        NexGear
      </a>
      <div class="nav-actions">
        <a href="login.html" class="btn-primary">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="auth-page page-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <div class="logo-icon" style="width:48px;height:48px;border-radius:14px;font-size:22px;font-weight:700; display:flex;align-items:center;justify-content:center;background:var(--text-primary);color:white;">N</div>
          </div>
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Join NexGear and start gaming smarter</p>
        </div>

        <form class="auth-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" class="form-input" placeholder="John"/>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-input" placeholder="Doe"/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" placeholder="you@example.com"/>
          </div>

          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" placeholder="+91 9876543210"/>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-with-icon">
              <input type="password" class="form-input" placeholder="Min. 8 characters"/>
              <button type="button" class="input-icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" placeholder="Re-enter password"/>
          </div>

          <div class="form-group">
            <label class="form-label">Delivery Address</label>
            <textarea class="form-textarea" placeholder="Full address including city, state & PIN code"></textarea>
          </div>

          <div class="remember-row">
            <label class="filter-check">
              <input type="checkbox"/> I agree to the <a href="#" style="color:var(--accent-blue)">Terms of Service</a> and <a href="#" style="color:var(--accent-blue)">Privacy Policy</a>
            </label>
          </div>

          <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign In →</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
