<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - NexGear</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo">
        <div class="logo-icon">N</div>
        NexGear
      </a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">N</div>
      <h1 class="login-title">Create Account</h1>
      <p class="login-sub">Join NexGear today</p>

      <!-- Form submits to backend PHP file -->
      <form id="register-form" method="POST" action="process_registration.php">

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" name="name" id="reg-name" placeholder="Full Name" required />
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" name="email" id="reg-email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-input" name="phone" id="reg-phone" placeholder="Phone Number" required />
        </div>

        <div class="form-group">
          <label class="form-label">Delivery Address</label>
          <textarea class="form-textarea" name="address" id="reg-address" placeholder="Full address with city, state and PIN code" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" name="password" id="reg-password" placeholder="Min. 6 characters" required />
        </div>

        <div id="reg-error" style="color:#dc3545; font-size:13px; margin-bottom:14px; display:none;"></div>

        <button type="submit" class="login-btn">Create Account →</button>
      </form>

      <p class="login-footer">
        Already have an account? <a href="login.html">Sign In →</a>
      </p>

    </div>
  </div>

  <div id="toast-msg"></div>

  <script src="register.js"></script>
  <script src="ui.js"></script>

</body>
</html>
