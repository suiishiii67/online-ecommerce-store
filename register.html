<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — NexGear</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo">
        <div class="logo-icon">N</div>
        NexGear
      </a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-primary">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="auth-page page-wrapper">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <div class="logo-icon" style="width:48px;height:48px;border-radius:14px;font-size:22px;font-weight:700; display:flex;align-items:center;justify-content:center;background:var(--text-primary);color:white;">N</div>
          </div>
          <h1 class="auth-title">Create account</h1>
          <p class="auth-subtitle">Join NexGear and start gaming smarter</p>
        </div>

        <!-- IDs added so auth.js can find these fields -->
        <form class="auth-form" id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">First Name</label>
              <input type="text" class="form-input" id="reg-name" placeholder="John" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-input" placeholder="Doe"/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="reg-email" placeholder="you@example.com" required/>
          </div>

          <div class="form-group">
            <label class="form-label">Phone Number</label>
            <input type="tel" class="form-input" placeholder="+91 9876543210"/>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-with-icon">
              <input type="password" class="form-input" id="reg-password" placeholder="Min. 6 characters" required/>
              <button type="button" class="input-icon-btn toggle-password">🙈</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-with-icon">
              <input type="password" class="form-input" id="reg-confirm" placeholder="Re-enter password"/>
              <button type="button" class="input-icon-btn toggle-password">🙈</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Delivery Address</label>
            <textarea class="form-textarea" placeholder="Full address including city, state & PIN code"></textarea>
          </div>

          <div class="remember-row">
            <label class="filter-check">
              <input type="checkbox" required/> I agree to the <a href="#" style="color:var(--accent-blue)">Terms of Service</a> and <a href="#" style="color:var(--accent-blue)">Privacy Policy</a>
            </label>
          </div>

          <!-- Error message placeholder — filled by auth.js -->
          <div id="reg-error" style="display:none;"></div>

          <button type="submit" class="btn-submit">Create Account →</button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign In →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="ui.js"></script>
  <script src="auth.js"></script>
</body>
</html>
