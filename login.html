<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - NexGear</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo">
        <div class="logo-icon">N</div>
        NexGear
      </a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">N</div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-sub">Sign in to your NexGear account</p>

      <!-- Form submits to backend PHP file -->
      <form id="login-form" method="POST" action="login_check.php">

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" name="email" id="login-email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" name="password" id="login-password" placeholder="••••••••" required />
        </div>

        <div id="login-error" style="color:#dc3545; font-size:13px; margin-bottom:14px; display:none;"></div>

        <button type="submit" class="login-btn" id="loginBtn">Sign In →</button>
      </form>

      <p class="login-footer">
        Don't have an account? <a href="register.html">Create one →</a>
      </p>

    </div>
  </div>

  <div id="toast-msg"></div>

  <script src="login.js"></script>
  <script src="ui.js"></script>

</body>
</html>
