<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cart — NexGear</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="cart.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo"><div class="logo-icon">N</div>NexGear</a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html" class="active">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge">3</span>
        </a>
        <a href="login.html" class="btn-primary">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <section class="section">
      <div class="container">

        <div class="breadcrumb">
          <a href="home.html">Home</a><span class="breadcrumb-sep">/</span>
          <a href="products.html">Products</a><span class="breadcrumb-sep">/</span>
          <span>My Cart</span>
        </div>

        <h1 class="page-title">My Cart <span class="cart-count-badge">0 Items</span></h1>

        <div class="cart-layout">
          <!-- CART ITEMS — rendered by app.js -->
          <div class="cart-items" id="cart-items-wrap"></div>

          <!-- ORDER SUMMARY -->
          <aside class="cart-summary" id="cart-summary-side">
            <h2 class="summary-title">Order Summary</h2>
            <div class="summary-rows">
              <div class="summary-row"><span>Subtotal</span><span id="sum-subtotal">₹0</span></div>
              <div class="summary-row"><span>Delivery Charges</span><span id="sum-delivery">FREE</span></div>
              <div class="summary-row"><span>Discount Applied</span><span id="sum-discount" class="text-red">₹0</span></div>
              <div class="summary-row"><span>GST (18%)</span><span id="sum-gst">₹0</span></div>
            </div>
            <div class="summary-total">
              <span>Total</span><span id="sum-total">₹0</span>
            </div>
            <a href="checkout.html" class="btn-checkout">Proceed to Checkout →</a>
          </aside>
        </div>

      </div>
    </section>
  </div>

  <footer>
    <div class="footer-container">
      <div class="footer-bottom" style="padding-top: 0; border-top: none;">
        <p>© 2025 NexGear. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script src="animations.js"></script>
</body>
</html>
