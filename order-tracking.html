<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders - NexGear</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="order-tracking.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo">
        <div class="logo-icon">N</div>
        NexGear
      </a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html" class="active">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn-primary">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">

    <div class="breadcrumb">
      <a href="home.html">Home</a> <span>/</span> My Orders
    </div>

    <h1 class="page-title">My Orders</h1>

    <!-- Track by Order ID -->
    <div class="track-form">
      <h3 style="font-size:15px; font-weight:600; margin-bottom:10px;">Track an Order</h3>
      <div style="display:flex; gap:10px;">
        <input type="text" class="form-input" id="trackInput" placeholder="Enter Order ID (e.g. NGR-2025-0001)" style="max-width:340px;" />
        <button class="btn-primary" id="trackBtn" style="padding:10px 20px; border-radius:8px;">Track →</button>
      </div>
      <div id="track-result" style="margin-top:10px; font-size:13px;"></div>
    </div>

    <!-- Orders will be loaded from backend here -->
    <div class="orders-list" id="orders-container">
      <div style="text-align:center; padding:60px 20px; color:#6e6e73;">
        <div style="font-size:48px; margin-bottom:16px;">📦</div>
        <p style="font-size:15px; font-weight:600; margin-bottom:8px;">No orders yet</p>
        <p style="font-size:13px;">Your orders will appear here after you place one.</p>
        <a href="products.html" class="btn-primary" style="display:inline-block; margin-top:20px; padding:10px 24px; border-radius:8px;">Shop Now</a>
      </div>
    </div>

  </div>

  <footer>
    <p>© 2025 NexGear. All rights reserved.</p>
  </footer>

  <div id="toast-msg"></div>

  <script src="order-tracking.js"></script>
  <script src="ui.js"></script>

</body>
</html>
