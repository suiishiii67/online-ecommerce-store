<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign In — NexGear</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--off-white);padding:80px 20px}
    .login-card{width:100%;max-width:400px;background:#fff;border:1px solid var(--light-gray);border-radius:20px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
    .login-logo{width:48px;height:48px;background:var(--text-primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;margin:0 auto 20px}
    .login-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}
    .login-sub{font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:28px}
    .login-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-secondary);margin-bottom:7px}
    .login-label a{color:var(--blue);font-weight:500;text-transform:none;letter-spacing:0;font-size:12px}
    .login-label a:hover{text-decoration:underline;opacity:1}
    .login-field{margin-bottom:16px;position:relative}
    .login-input{width:100%;background:var(--off-white);border:1.5px solid var(--light-gray);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text-primary);font-family:var(--font);outline:none}
    .login-input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(0,113,227,.1)}
    .login-input::placeholder{color:var(--mid-gray)}
    .pwd-wrap{position:relative}
    .pwd-wrap .login-input{padding-right:42px}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mid-gray);display:flex;align-items:center}
    .eye-btn:hover{color:var(--text-primary)}
    .login-remember{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--text-secondary);cursor:pointer}
    .login-remember input{accent-color:var(--blue);width:14px;height:14px}
    .login-btn{width:100%;padding:14px;background:var(--text-primary);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:background .2s}
    .login-btn:hover{background:#333}
    .login-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--text-secondary)}
    .login-footer a{color:var(--blue);font-weight:600}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo"><div class="logo-icon">N</div>NexGear</a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Feedback</a></li>
      </ul>
      <div class="nav-actions">
        <a href="register.html" class="btn-primary">Create Account</a>
      </div>
    </div>
  </nav>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">N</div>
      <h1 class="login-title">Welcome back</h1>
      <p class="login-sub">Sign in to your NexGear account</p>
      <form id="login-form">
        <div class="login-field">
          <label class="login-label">Email Address</label>
          <input type="email" class="login-input" id="login-email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="login-field">
          <label class="login-label">Password <a href="#">Forgot password?</a></label>
          <div class="pwd-wrap">
            <input type="password" class="login-input" id="login-password" placeholder="••••••••" required autocomplete="current-password"/>
            <button type="button" class="eye-btn toggle-password" aria-label="Toggle password">
              🙈
            </button>
          </div>
        </div>
        <label class="login-remember"><input type="checkbox"/> Remember me for 30 days</label>
        
        <!-- Error message placeholder — filled by auth.js -->
        <div id="login-error" style="display:none; margin-bottom: 16px;"></div>

        <button type="submit" class="login-btn" id="signInBtn">Sign In →</button>
      </form>
      <div class="login-footer">Don't have an account? <a href="register.html">Create one →</a></div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="ui.js"></script>
  <script src="auth.js"></script>
</body>
</html>
