<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Product — NexGear</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .pd-section{padding-top:calc(var(--nav) + 28px);padding-bottom:72px}
    .pd-hero{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-bottom:48px}
    .pd-image-wrap{background:var(--off-white);border:1px solid var(--light-gray);border-radius:20px;display:flex;align-items:center;justify-content:center;min-height:360px;position:relative;overflow:hidden}
    .pd-emoji{font-size:130px;position:relative;z-index:1}
    .pd-hero-badge{position:absolute;top:16px;left:16px;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;text-transform:uppercase;z-index:2}
    .pd-hero-badge.new{background:var(--green);color:#fff}
    .pd-hero-badge.sale{background:var(--red);color:#fff}
    .pd-hero-badge.popular{background:var(--blue);color:#fff}
    .pd-brand-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .pd-brand{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue)}
    .pd-cat-pill{font-size:11px;font-weight:600;background:var(--off-white);border:1px solid var(--light-gray);border-radius:16px;padding:2px 9px;color:var(--text-secondary)}
    .pd-title{font-size:26px;font-weight:800;letter-spacing:-.6px;line-height:1.2;color:var(--text-primary);margin-bottom:6px}
    .pd-tagline{font-size:14px;color:var(--text-secondary);margin-bottom:16px;font-style:italic}
    .pd-rating-row{display:flex;align-items:center;gap:8px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--light-gray)}
    .pd-stars{color:#f5a623;font-size:15px}
    .pd-rating-num{font-weight:700;font-size:14px}
    .pd-reviews{font-size:13px;color:var(--blue);text-decoration:underline;cursor:pointer}
    .pd-price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
    .pd-price-current{font-size:30px;font-weight:800;letter-spacing:-1px}
    .pd-price-original{font-size:16px;color:var(--text-secondary);text-decoration:line-through}
    .pd-discount-badge{background:rgba(255,59,48,.1);color:var(--red);font-size:12px;font-weight:700;padding:3px 9px;border-radius:14px}
    .pd-savings{font-size:13px;color:var(--green);font-weight:600;margin-bottom:18px}
    .pd-features{list-style:none;margin:0 0 20px;padding:0;display:flex;flex-direction:column;gap:7px}
    .pd-feature{display:flex;align-items:flex-start;gap:9px;font-size:14px;line-height:1.5}
    .pd-check{width:18px;height:18px;background:rgba(52,199,89,.12);color:#34c759;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
    .pd-qty-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .pd-qty-label{font-size:14px;font-weight:600;color:var(--text-secondary)}
    .pd-actions{display:flex;gap:10px;margin-bottom:18px}
    .pd-btn-cart{flex:1;padding:13px 18px;background:var(--text-primary);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s;font-family:inherit}
    .pd-btn-cart:hover{background:#333}
    .pd-btn-buy{flex:1;padding:13px 18px;background:var(--blue);color:#fff;border-radius:12px;font-size:15px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .pd-btn-buy:hover{background:var(--blue-h);opacity:1}
    .pd-meta-chips{display:flex;flex-wrap:wrap;gap:7px}
    .pd-chip{font-size:12px;font-weight:600;color:var(--text-secondary);background:var(--off-white);border:1px solid var(--light-gray);border-radius:16px;padding:5px 11px}
    .pd-tabs{display:flex;border-bottom:2px solid var(--light-gray);gap:2px;margin-bottom:28px}
    .pd-tab{padding:11px 22px;background:none;border:none;font-size:14px;font-weight:600;color:var(--text-secondary);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .18s;font-family:inherit}
    .pd-tab:hover{color:var(--text-primary)}
    .pd-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
    .pd-tab-body{margin-bottom:48px}
    .pd-desc-text{font-size:15px;line-height:1.8;color:var(--text-primary);max-width:720px}
    .spec-table{width:100%;border-collapse:collapse}
    .spec-table tr:nth-child(odd) td{background:var(--off-white)}
    .spec-table td{padding:11px 16px;font-size:14px}
    .spec-key{font-weight:600;color:var(--text-secondary);width:200px}
    .spec-val{color:var(--text-primary);font-weight:500}
    .pd-review-summary{display:flex;align-items:center;gap:24px;margin-bottom:28px;padding:24px;background:var(--off-white);border-radius:16px}
    .pd-review-score{font-size:58px;font-weight:800;letter-spacing:-2px;line-height:1}
    .pd-review-card{background:#fff;border:1px solid var(--light-gray);border-radius:16px;padding:20px;margin-bottom:12px;transition:box-shadow .2s}
    .pd-review-card:hover{box-shadow:var(--shadow)}
    .pd-review-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .pd-reviewer-avatar{width:36px;height:36px;border-radius:50%;background:var(--text-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
    .pd-reviewer-name{font-size:14px;font-weight:700}
    .pd-review-date{font-size:12px;color:var(--text-secondary)}
    .pd-review-stars{color:#f5a623;font-size:14px;margin-left:auto}
    .pd-review-text{font-size:14px;line-height:1.7;color:var(--text-secondary)}
    .pd-related{border-top:1px solid var(--light-gray);padding-top:40px}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="home.html" class="nav-logo"><div class="logo-icon">N</div>NexGear</a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="order-tracking.html">Orders</a></li>
        <li><a href="feedback.html">Contact Us</a></li>
      </ul>
      <div class="nav-actions">
        <div class="nav-search" id="searchWrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="navSearchInput" placeholder="Search accessories..." autocomplete="off"/>
          <div class="search-dropdown" id="searchDropdown"></div>
        </div>
        <a href="cart.html" class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge"></span>
        </a>
        <a href="login.html" class="btn-primary">Sign In</a>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <section class="section pd-section">
      <div class="container">
        <div class="breadcrumb" id="pd-breadcrumb">
          <a href="home.html">Home</a><span class="breadcrumb-sep">/</span>
          <a href="products.html">Products</a><span class="breadcrumb-sep">/</span>
          <span id="pd-breadcrumb-name">Loading…</span>
        </div>
        <div id="product-detail-root">
          <div style="text-align:center;padding:80px 20px">
            <div style="font-size:40px;margin-bottom:12px">⏳</div>
            <p style="color:var(--text-secondary)">Loading product…</p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer>
    <div class="footer-container">
      <div class="footer-bottom" style="padding-top:0;border-top:none">
        <p>© 2025 NexGear. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    const _p = new URLSearchParams(window.location.search);
    const _id = _p.get('id');
    if (_id && CATALOG[_id]) document.getElementById('pd-breadcrumb-name').textContent = CATALOG[_id].name;
  </script>
</body>
</html>
