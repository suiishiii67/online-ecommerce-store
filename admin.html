<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Admin - Product Inventory</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
  
  <nav class="admin-navbar">
    <div class="admin-container">
      <div class="admin-brand">
        <strong>NexGear Admin</strong>
      </div>
      <div class="admin-links">
        <a href="home.html">Back to Store</a>
        <a href="#" class="active">Inventory</a>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <header class="admin-header">
      <h1>Inventory Management</h1>
      <div class="admin-actions">
        <input type="text" id="adminSearchInput" placeholder="Search products...">
        <button id="addBtn" class="btn-primary">Add New Product</button>
      </div>
    </header>

    <div class="admin-stats">
      <div class="stat-box">
        <span class="label">Total Products</span>
        <span class="value" id="totalProducts">0</span>
      </div>
      <div class="stat-box">
        <span class="label">Inventory Value</span>
        <span class="value" id="totalValue">₹0</span>
      </div>
      <div class="stat-box">
        <span class="label">Low Stock</span>
        <span class="value" id="lowStock">0</span>
      </div>
    </div>

    <div class="admin-content">
      <table class="inventory-table">
        <thead>
          <tr>
            <th>Product Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventoryTableBody">
          <!-- Table content -->
        </tbody>
      </table>
      <div id="emptyState" style="display: none; text-align: center; padding: 40px; color: #666;">
        No products found matching your search.
      </div>
    </div>
  </div>

  <div id="productModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Product</h2>
      <form id="productForm">
        <input type="hidden" id="prodId">
        
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="prodName" required>
        </div>
        <div class="form-group">
          <label>Brand</label>
          <input type="text" id="prodBrand" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="prodCat">
            <option value="Headphones">Headphones</option>
            <option value="Monitors">Monitors</option>
            <option value="Keyboards">Keyboards</option>
            <option value="Mouse">Mouse</option>
            <option value="Microphones">Microphones</option>
            <option value="Webcams">Webcams</option>
            <option value="Gaming Chairs">Gaming Chairs</option>
            <option value="Accessories">Accessories</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price (₹)</label>
          <input type="number" id="prodPrice" required>
        </div>
        <div class="form-group">
          <label>Stock</label>
          <input type="number" id="prodStock" required>
        </div>
        <div class="form-group">
          <label>Icon (Emoji)</label>
          <input type="text" id="prodIcon">
        </div>
        <div class="form-group">
          <label>Tag</label>
          <input type="text" id="prodTag">
        </div>

        <div class="modal-buttons">
          <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
